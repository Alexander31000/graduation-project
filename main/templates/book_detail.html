<!doctype html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/book_detail.css' %}">
</head>
<body>
    <div class="logo">
        <a href="{% url 'main_page' %}" style="text-decoration: none; color: inherit;">
            SmartLib
        </a>
    </div>
    <h1>{{ book.title }}</h1>
    <h2>{{ book.description }}</h2>


    <h3>Дополнительные изображения:</h3>
    {% for img in additional_imgs %}
        <img src="{{ img.addit_imgs.url }}" alt="Доп. фото" style="width: 200px; margin: 10px;">
    {% empty %}
        <p>Дополнительных фото нет.</p>
    {% endfor %}

    <div class="button-group">
        <a href="{% url 'book_redaktor' book.id %}" class="cancel-link">Редактировать</a>
    </div>


        <div class="popular-books">
        <h3>Популярные книги</h3>

        <div class="popular-books-list">
            {% for book in popular_books %}
                <div class="popular-book-item">
                    <img src="{{ book.img.url }}" alt="{{ book.title }}">
                    <p>{{ book.title }}</p>
                </div>
            {% endfor %}
        </div>
    </div>




</body>
</html>
